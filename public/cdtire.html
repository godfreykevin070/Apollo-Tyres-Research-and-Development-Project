<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDTire - Apollo Tyres R&D</title>
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/mf.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.5/xlsx.full.min.js"></script>
</head>
<body>
    <header class="main-header">
    <div class="header-left">
        <img src="/images/Apollo-Tyres-Logo.png" alt="Apollo Tyres Logo" class="logo" onclick="window.location.href='/index.html'" style="cursor: pointer;">
    </div>
    <h1 class="header-title">Tyre Virtualization Tool</h1>
    
    <!-- Header Buttons -->
    <div class="header-buttons">
        <div class="header-btn-group">
            <button class="protocol-header-btn" onclick="window.location.href='/user-dashboard.html'" title="Home">
                <i class="fas fa-home"></i>
            </button>
            <button class="protocol-header-btn" onclick="window.history.back()" title="Back">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button class="protocol-header-btn" id="refreshBtn" onclick="refreshPage()" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        <div class="header-btn-group">
            <button class="protocol-header-btn" onclick="window.open('/components/help.pdf', '_blank')" title="Help">
                <i class="fas fa-question-circle"></i>
            </button>
            <button class="protocol-header-btn logout" id="logoutBtn" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>
</header>
    
    <main>
        <h2 class="page-title">CDTire</h2>

        <!-- Replace lines 48-132 with: -->

<!-- Mandatory inputs always visible -->
<div class="input-container mandatory-inputs">
    <div class="input-group">
        <h3>Rim Width <span class="required">*</span></h3>
        <div class="input-row">
            <label for="rimWidth">RW:</label>
            <input type="text" id="rimWidth" name="rimWidth" placeholder="Enter RW value in mm" required>
        </div>
    </div>

    <div class="input-group">
        <h3>Rim Diameter <span class="required">*</span></h3>
        <div class="input-row">
            <label for="rimDiameter">RD:</label>
            <input type="text" id="rimDiameter" name="rimDiameter" placeholder="Enter RD value in mm" required>
        </div>
    </div>

    <div class="input-group">
        <h3>Pressure <span class="required">*</span></h3>
        <div class="input-row">
            <label for="p1">P:</label>
            <input type="text" id="p1" name="p1" placeholder="Enter pressure value in psi" pattern="[0-9]*\.?[0-9]+" required>
        </div>
    </div>

    <div class="input-group">
        <h3>Load 1 <span class="required">*</span></h3>
        <div class="input-row">
            <label for="l1">L1:</label>
            <input type="text" id="l1" name="l1" placeholder="Enter L1 value in Kg" pattern="[0-9]*\.?[0-9]+" required>
        </div>
    </div>
</div>

<!-- Optional Parameters Dropdown -->
<div class="optional-params-section">
    <button type="button" class="add-param-btn" id="addParamBtn">
        <i class="fas fa-plus"></i> Add Optional Parameters
    </button>
    
    <div class="dropdown-menu" id="paramDropdown" style="display: none;">
        <div class="dropdown-item" data-param="nominalWidth">Nominal Width (NW)</div>
        <div class="dropdown-item" data-param="outerDiameter">Outer Diameter (OD)</div>
        <div class="dropdown-item" data-param="l2">Load 2 (L2)</div>
        <div class="dropdown-item" data-param="l3">Load 3 (L3)</div>
        <div class="dropdown-item" data-param="l4">Load 4 (L4)</div>
        <div class="dropdown-item" data-param="l5">Load 5 (L5)</div>
        <div class="dropdown-item" data-param="vel">Test Speed (VEL)</div>
        <div class="dropdown-item" data-param="ia">Inclination Angle (IA)</div>
        <div class="dropdown-item" data-param="sr">Slip Ratio (SR)</div>
        <div class="dropdown-item" data-param="aspectRatio">Aspect Ratio (AR)</div>
    </div>
</div>

<!-- Container for dynamically added optional inputs -->
<div class="input-container optional-inputs" id="optionalInputsContainer"></div>

<!-- Mesh File Upload (always visible) -->
<div class="input-container">
    <div class="input-group">
        <h3>Mesh File</h3>
        <div class="input-row file-upload">
            <input type="file" id="meshFile" name="meshFile" accept=".inp">
        </div>
    </div>
</div>
        
        <div id="errorMessage" class="error-message"></div>
        
        <div class="summary-container">
            <h3 class="summary-title">Test Summary</h3>
            <div id="testSummary" class="summary-content"></div>
        </div>

        <div class="submit-container">
            <button id="submitBtn" class="submit-button">Submit</button>
        </div>
    </main>
    
    <footer></footer>

    <script src="/js/cdtire.js"></script>
    <script src="/js/protocol-inputs.js"></script>
    <!-- ADD THIS BEFORE </body> in cdtire.html -->
<script src="/js/persist.js"></script>
<script>
const PROTOCOL = 'CDTire';

async function onCDTireComputed(inputsObject, matrixObject, tydexFilesArray) {
  const projectId = window.currentProjectId || getProjectIdFromURL();
  await persistDraftAndTydex(projectId, PROTOCOL, inputsObject, matrixObject, tydexFilesArray);
}

document.getElementById('generate-cdtire')?.addEventListener('click', async () => {
  const inputsObject    = window.cdtireInputs;
  const matrixObject    = window.cdtireMatrix;
  const tydexFilesArray = window.cdtireTydexFiles || [];
  await onCDTireComputed(inputsObject, matrixObject, tydexFilesArray);
});
</script>
<!-- insert before </body> on each protocol page -->
 <!-- Add BEFORE the closing </body> tag: -->

<script>
//  VERIFY PROTOCOL IS SET ON PAGE LOAD
document.addEventListener('DOMContentLoaded', () => {
    const protocol = sessionStorage.getItem('currentProtocol');
    if (!protocol || protocol === 'null') {
        console.warn('⚠️ Protocol not set, setting to CDTire');
        sessionStorage.setItem('currentProtocol', 'CDTire');
    }
    console.log('📋 Current Protocol:', sessionStorage.getItem('currentProtocol'));
    console.log('📋 Current Project:', sessionStorage.getItem('currentProject'));
    console.log('📋 Current Project ID:', sessionStorage.getItem('currentProjectId'));
});
</script>
<script src="/js/input-sidebar.js"></script>
</body>
</html>
